<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeighbourBoard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f4f8;
            color: #333;
        }

        /* Navbar */
        .navbar {
            background-color: #2c7be5;
            padding: 14px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 {
            color: white;
            font-size: 22px;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 16px;
            font-size: 15px;
        }
        .navbar a:hover { text-decoration: underline; }

        /* Main container */
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Post cards */
        .post-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .post-card h3 {
            font-size: 20px;
            margin-bottom: 8px;
            color: #2c7be5;
        }
        .post-card p { margin-bottom: 6px; }
        .post-card .meta {
            font-size: 13px;
            color: #888;
            margin-top: 10px;
        }

        /* Category badge */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .badge-events { background: #d4edda; color: #155724; }
        .badge-lostfound { background: #fff3cd; color: #856404; }
        .badge-notices { background: #cce5ff; color: #004085; }
        .badge-recommendations { background: #f8d7da; color: #721c24; }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #2c7be5;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            border: none;
            cursor: pointer;
        }
        .btn:hover { background: #1a5dc8; }

        /* Forms */
        .form-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .form-card h2 { margin-bottom: 20px; color: #2c7be5; }
        .form-card input,
        .form-card textarea,
        .form-card select {
            width: 100%;
            padding: 10px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .form-card input:focus,
        .form-card textarea:focus,
        .form-card select:focus {
            outline: none;
            border-color: #2c7be5;
        }

        .error { color: red; margin-bottom: 10px; }
        .empty { text-align: center; color: #888; margin-top: 40px; }
    </style>
</head>
<body>

<nav class="navbar">
    <h1>🏘️ NeighbourBoard</h1>
    {% if request.user.is_authenticated %}
        <div>
            <a href="/profile/" style="color:white">👤 {{ request.user.username }}</a>
            <a href="/create/" class="btn" style="margin-left:16px">+ New Post</a>
            <a href="/logout/">Logout</a>
        </div>
    {% endif %}
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
